name: Vantage Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
          sudo chown -R $USER /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          echo "/opt/theos/bin" >> $GITHUB_PATH

      - name: Setup iOS SDK
        run: |
          mkdir -p /opt/theos/sdks
          # Only download the specific iPhoneOS SDK to avoid errors
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.zip
          unzip -q iPhoneOS14.5.sdk.zip -d /opt/theos/sdks/
          rm iPhoneOS14.5.sdk.zip
          
      - name: Build Vantage
        run: |
          export THEOS=/opt/theos
          make package FINALPACKAGE=1
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vantage-Release
          path: packages/*.deb
          if-no-files-found: error
