name: Vantage Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
          sudo chown -R $USER /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          echo "/opt/theos/bin" >> $GITHUB_PATH

      - name: Setup iOS SDK
        run: |
          # Use a mirror that allows direct cloning of single SDKs
          git clone --depth 1 https://github.com/theos/sdks.git /tmp/sdks
          mkdir -p /opt/theos/sdks
          # Move only the iPhoneOS SDKs to the proper folder
          mv /tmp/sdks/iPhoneOS*.sdk /opt/theos/sdks/
          
      - name: Build Vantage
        run: |
          export THEOS=/opt/theos
          # Clean before building to ensure no stale files
          make clean
          make package FINALPACKAGE=1
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vantage-Release
          path: packages/*.deb
          if-no-files-found: error
